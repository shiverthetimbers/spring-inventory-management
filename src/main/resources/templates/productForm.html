<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<head>

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    <title>Part Form</title>

    <!--    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />-->
</head>
<body>
<div th:class="container">
    <h1>Product Detail</h1>
    <hr>
    <form action="#" th:action="@{/showFormAddProduct}" th:object="${product}" method="POST">
        <!-- Add hidden form field to handle update -->
        <p><input type="hidden" th:field="*{id}"/></p>

        <p><label>Product Name:<br>
            <input th:class="form-control" type="text" th:field="*{name}" placeholder="Name" class="form-control mb-4 col-4"/>
        </label></p>

        <p><label>Price:<br>
            <input th:class="form-control" type="text" th:field="*{price}" placeholder= "Price" class="form-control mb-4 col-4"/>
        </label></p>


        <p><label>Inventory:<br>
            <input th:class="form-control" type="text" th:field="*{inv}" placeholder="Inventory" class="form-control mb-4 col-4"/>
        </label></p>

        <div th:if="${#fields.hasAnyErrors()}">
            <ul>
                <li th:each="err: ${#fields.allErrors()}" th:text="${err}"></li>
            </ul>
        </div>

        <p><input type="submit" value="Submit" /></p>
    </form>


    <h2>Available Parts</h2>
    <table class="table table-bordered table-striped">
        <thead class="thead-dark">
        <tr>
            <th>Name</th>
            <th>Price</th>
            <th>Inventory</th>
            <th>Action</th>
        </tr>
        </thead>
        <form>
            <tr th:each="tempPart : ${availparts}">
                <td th:text="${tempPart.name}">1</td>
                <td th:text="${tempPart.price}">1</td>
                <td th:text="${tempPart.inv}">1</td>
                <td><a th:href="@{/associatepart(partID=${tempPart.id})}" class="btn btn-primary btn-sm mb-3">Add</a>
                </td>
            </tr>
        </form>
    </table>
    <h2>Associated Parts</h2>
    <table class="table table-bordered table-striped">
        <thead class="thead-dark">
        <tr>
            <th>Name</th>
            <th>Price</th>
            <th>Inventory</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="tempPart : ${assparts}">
            <td th:text="${tempPart.name}">1</td>
            <td th:text="${tempPart.price}">1</td>
            <td th:text="${tempPart.inv}">1</td>
            <td><a th:href="@{/removepart(partID=${tempPart.id})}"  class="btn btn-primary btn-sm mb-3">Remove</a>
            </td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/mainscreen}" class="btn btn-primary btn-sm mb-3">Home</a>
</div>
</body>
</html>

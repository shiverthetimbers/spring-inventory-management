<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<head>

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    <title>Product Details</title>

    <!--    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />-->
</head>
<body>
<div th:class="container">
    <h1>Product Details</h1>
    <hr>
    <form action="#" th:action="@{/saveProduct}" th:object="${product}" method="POST">
        <!-- Add hidden form field to handle update -->
        <input type="hidden" th:field="*{id}"/>

        <label>Product Name:<br>
            <input th:class="form-control" type="text" th:field="*{name}" placeholder="Name" class="form-control mb-4 col-4"/>
        </label>

        <label>Price:<br>
            <input th:class="form-control" type="text" th:field="*{price}" placeholder= "Price" class="form-control mb-4 col-4"/>
        </label>


        <label>Inventory:<br>
            <input th:class="form-control" type="text" th:field="*{inv}" placeholder="Inventory" class="form-control mb-4 col-4"/>
        </label>

        <div th:if="${#fields.hasAnyErrors()}">
            <ul>
                <li th:each="err: ${#fields.allErrors()}" th:text="${err}"></li>
            </ul>
        </div>

        <input type="submit" value="Save" />
    </form>


    <h2>Recipe</h2>
    <table class="table table-bordered table-striped">
        <thead class="thead-dark">
        <tr>
            <th>Name</th>
            <th>Count</th>
            <th>Price</th>
        </tr>
        </thead>
        <tbody th:if="${product.getId() != 0}">
            <tr th:each="line : ${recipeLines}">
                <td th:text="${line.part.name}">1</td>
                <td th:text="${line.partCount}">1</td>
                <td th:text="${line.part.price}">1</td>
            </tr>
        </tbody>
        <tbody th:if="${product.getId() == 0}">
        <tr>
            <td th:colspan="3">You can create a recipe after saving the product</td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/mainscreen}" class="btn btn-primary btn-sm mb-3">Home</a>
</div>
</body>
</html>

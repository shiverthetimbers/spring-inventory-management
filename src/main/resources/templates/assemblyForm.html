<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<head>

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    <title>Product Details</title>

    <!--    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />-->
</head>
<body>
<div th:class="container">
    <h1>Product Details</h1>
    <hr>
    <form th:object="${product}">
        <!-- Add hidden form field to handle update -->
        <input type="hidden" th:field="*{id}"/>

        <label>Product Name:<br>
            <input readonly type="text" th:field="*{name}" placeholder="Name" class="form-control mb-4 col-4"/>
        </label>

        <label>Price:<br>
            <input readonly type="text" th:field="*{price}" placeholder= "Price" class="form-control mb-4 col-4"/>
        </label>

        <label>Inventory:<br>
            <input readonly type="text" th:field="*{inv}" placeholder="Inventory" class="form-control mb-4 col-4"/>
        </label>

    </form>
    <br>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div th:object="${product}" class="container d-flex gap-4">
        <form class="d-flex flex-column align-items-center gap-2" th:action="@{/products/{productID}/assembly/disassemble(productID=*{id})}" th:method="POST">
            <label>
                <input type="number" name="quantity" th:placeholder="0" min="1" class="form-control" required>
            </label>
            <input th:disabled="${canDisassemble != 3}" type="submit" value="Disassemble" class="w-50">
        </form>
        <form class="d-flex flex-column align-items-center gap-2" th:action="@{/products/{productID}/assembly/assemble(productID=*{id})}" th:method="POST">
            <label>
                <input type="number" name="quantity" th:placeholder="0" min="1" class="form-control" required>
            </label>
            <input th:disabled="${canAssemble != 3}" type="submit" value="Assemble" class="w-50">
        </form>
    </div>
    <br>
    <h2>Recipe</h2>
    <br>
    <table style="table-layout: fixed" class="table table-bordered table-striped">
        <thead class="thead-dark">
        <tr>
            <th>Name</th>
            <th>Count Per Product</th>
            <th>On Hand</th>
            <th>Inventory Min</th>
            <th>Inventory Max</th>
            <th>Price</th>
        </tr>
        </thead>
        <tbody>
            <tr th:each="line : ${recipeLines}">
                <td th:text="${line.part.name}">1</td>
                <td th:text="${line.partCount}">1</td>
                <td th:text="${line.part.inv}">1</td>
                <td th:text="${line.part.minInv}">1</td>
                <td th:text="${line.part.maxInv}">1</td>
                <td th:text="${line.part.price}">1</td>
            </tr>
        </tbody>
    </table>
    <hr>
    <a th:href="@{/mainscreen}" class="btn btn-primary btn-sm mb-3">Home</a>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    <title>Petey's PC Shop</title>
</head>
<body>

<div class="container">
    <h1>Petey's PC Shop</h1>
    <a th:href="@{/about}" class="btn btn-primary btn-sm mb-3">About</a>
    <hr>
    <h2>Parts</h2>
    <form th:action="@{/mainscreen}">
        <label>Find a Part:<br><input type="text" name="partkeyword" id="partkeyword" size="50" th:value="${partkeyword}" required /></label>
        &nbsp;
        <input type="submit" value="Search" />
        &nbsp;
        <input type="button" value="Clear" id="btnClearPart" onclick="clearSearch()" />
    </form>
    <br><br>
    <a th:href="@{/parts/inhouse/add}" class="btn btn-primary btn-sm mb-3">Add Inhouse Part</a>
    <a th:href="@{/parts/outsourced/add}" class="btn btn-primary btn-sm mb-3">Add Outsourced Part</a>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
    <table class="table table-bordered table-striped">
        <thead class="thead-dark">
        <tr>
            <th>Name</th>
            <th>Price</th>
            <th>Inventory</th>
            <th>Min Inventory</th>
            <th>Max Inventory</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="tempPart : ${parts}">
            <td th:text="${tempPart.name}">1</td>
            <td th:text="${tempPart.price}">1</td>
            <td th:text="${tempPart.inv}">1</td>
            <td th:text="${tempPart.minInv}">1</td>
            <td th:text="${tempPart.maxInv}">1</td>
            <td>
                <a th:href="@{/parts/{partID}/edit(partID=${tempPart.id})}" class="btn btn-primary btn-sm mb-3">Update</a>
                <a th:href="@{/parts/{partID}/delete(partID=${tempPart.id})}" class="btn btn-danger btn-sm mb-3"
                   onclick="if(!(confirm('Are you sure you want to delete this part?')))return false">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
    <h2>Products</h2>
    <form th:action="@{/mainscreen}">
        <label>Find a Product:<br><input type="text" name="productkeyword" id="productkeyword" size="50" th:value="${productkeyword}" required /></label>
        &nbsp;
        <input type="submit" value="Search" />
        &nbsp;
        <input type="button" value="Clear" id="btnClearProduct" onclick="clearSearch()" />
    </form>
    <script type="text/javascript">
        function clearSearch() {
            window.location = "[[@{/}]]";
        }
    </script>
    <br><br>
    <a th:href="@{/addProduct}" class="btn btn-primary btn-sm mb-3">Add Product</a>
    <table class="table table-bordered table-striped">
        <thead class="thead-dark">
        <tr>
            <th>Name</th>
            <th>Price</th>
            <th>Inventory</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="each : ${products}">
            <td th:text="${each.name}">1</td>
            <td th:text="${each.price}">1</td>
            <td th:text="${each.inv}">1</td>
            <td>
                <a th:href="@{/buyProduct(productID=${each.id})}" class="btn btn-outline-dark btn-sm mb-3">Buy Now</a>
                <a th:href="@{/updateProduct(productID=${each.id})}" class="btn btn-primary btn-sm mb-3">Details</a>
                <a th:href="@{/products/{productID}/recipe/edit(productID=${each.id})}" class="btn btn-primary btn-sm mb-3">Adjust Recipe</a>
                <a th:href="@{/deleteproduct(productID=${each.id})}" class="btn btn-danger btn-sm mb-3"
                   onclick="if(!(confirm('Are you sure you want to delete this product?')))return false">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>

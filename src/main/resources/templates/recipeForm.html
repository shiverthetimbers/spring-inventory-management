<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<head>

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    <title>Edit Recipe</title>

    <!--    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />-->
</head>
<body>
<div th:class="container">
    <h1>Edit Recipe</h1>
    <hr>
    <form th:object="${product}">
        <!-- Add hidden form field to handle update -->
        <input type="hidden" th:field="*{id}"/>

        <label>Product Name:<br>
            <input readonly th:class="form-control" type="text" th:field="*{name}" placeholder="Name" class="form-control mb-4 col-4"/>
        </label>

        <label>Price:<br>
            <input readonly th:class="form-control" type="text" th:field="*{price}" placeholder= "Price" class="form-control mb-4 col-4"/>
        </label>


        <label>Inventory:<br>
            <input readonly th:class="form-control" type="text" th:field="*{inv}" placeholder="Inventory" class="form-control mb-4 col-4"/>
        </label>
    </form>
    <br>
    <h2>Recipe</h2>
    <small class="italic help-note">Each <span style="color: red">part count</span> should be between 1 and 10</small>
    <table style="table-layout: fixed" class="table table-bordered table-striped">
        <thead class="thead-dark">
        <tr>
            <th>Name</th>
            <th>Count</th>
            <th>Price</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody th:if="${!recipeLines.isEmpty()}">
            <tr th:each="line : ${recipeLines}">
                <td th:text="${line.part.name}">1</td>
                <td>
                    <div style="width: fit-content" class="d-flex gap-2">
                        <form th:action="@{/products/{productID}/recipe/lines/{lineID}/decrement(productID=${product.id}, lineID=${line.id})}" th:method="POST">
                            <input th:type="hidden" th:name="lineID" th:value="${line.id}">
                            <button style="width: 30px"  class="btn btn-outline-dark btn-sm">-</button>
                        </form>
                        <input readonly class="form-control form-control-sm text-center" style="width: 60px" th:type="text" th:value="${line.partCount}">
                        <form th:action="@{/products/{productID}/recipe/lines/{lineID}/increment(productID=${product.id}, lineID=${line.id})}" th:method="POST">
                            <input th:type="hidden" th:name="lineID" th:value="${line.id}">
                            <button style="width: 30px" type="submit" class="btn btn-outline-dark btn-sm">+</button>
                        </form>
                    </div>
                </td>
                <td th:text="${line.part.price}">1</td>
                <td>
                    <form th:action="@{/products/{productID}/recipe/lines/remove(productID=${product.id})}" th:method="POST">
                        <input th:type="hidden" th:name="lineID" th:value="${line.id}">
                        <button style="width: 70px" type="submit" class="btn btn-danger btn-sm mb-3">Remove</button>
                    </form>
                </td>
            </tr>
        </tbody>
        <tbody th:if="${recipeLines.isEmpty()}">
        <tr>
            <td th:colspan="3">Add available parts to this recipe</td>
        </tr>
        </tbody>
    </table>

    <h2>Available Parts</h2>
    <table style="table-layout: fixed" class="table table-bordered table-striped">
        <thead class="thead-dark">
        <tr>
            <th>Name</th>
            <th>Inventory</th>
            <th>Price</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="part : ${availParts}" th:object="${product}">
            <td th:text="${part.name}">1</td>
            <td th:text="${part.inv}">1</td>
            <td th:text="${part.price}">1</td>
            <td>
                <form th:action="@{/products/{productID}/recipe/lines/add(productID=${product.id})}" th:method="POST">
                    <input th:type="hidden" th:name="partID" th:value="${part.id}">
                    <button style="width: 70px" type="submit" class="btn btn-primary btn-sm mb-3">Add</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <a th:href="@{/mainscreen}" class="btn btn-primary btn-sm mb-3">Home</a>
</div>
</body>
</html>

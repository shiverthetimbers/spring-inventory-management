<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
    <head>

        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
              integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

        <title>Part Form</title>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    </head>
    <body>
    <div class="container">
        <h1>Inhouse Part Detail</h1>
        <hr>
        <form action="#" th:action="@{/showFormAddInPart}" th:object="${inhousepart}" method="POST">

            <!-- Add hidden form field to handle update -->
            <p><input type="hidden" th:field="*{id}"/></p>

            <p><label>Part Name:<br>
                <input th:class="form-control" type="text" th:field="*{name}" placeholder="Name" class="form-control mb-4 col-4"/>
            </label></p>
            <p style="color: red" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name Error</p>

            <p><label>Price:<br>
                <input th:class="form-control" type="text" th:field="*{price}" placeholder= "Price" class="form-control mb-4 col-4"/>
            </label></p>
            <p style="color: red" th:if="${#fields.hasErrors('price')}" th:errors="*{price}">Price Error</p>

            <p><label>Inventory:<br>
                <input th:class="form-control" type="text" th:field="*{inv}" placeholder="Inventory" class="form-control mb-4 col-4"/>
            </label></p>
            <p style="color: red" th:if="${#fields.hasErrors('inv')}" th:errors="*{inv}">Inventory Error</p>

            <p><label>Minimum:<br>
                <input th:class="form-control" type="text" th:field="*{minInv}" placeholder="Minimum Inventory" class="form-control mb-4 col-4"/>
            </label></p>
            <p style="color: red" th:if="${#fields.hasErrors('minInv')}" th:errors="*{minInv}">Minimum Inventory Error</p>

            <p><label>Maximum:<br>
                <input th:class="form-control" type="text" th:field="*{maxInv}" placeholder="Maximum Inventory" class="form-control mb-4 col-4"/>
            </label></p>
            <p style="color: red" th:if="${#fields.hasErrors('maxInv')}" th:errors="*{maxInv}">Maximum Inventory Error</p>

            <div class="container">
                <ul th:if="${#fields.hasGlobalErrors()}">
                    <li style="color: red" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></li>
                </ul>
            </div>

            <p><label>Part ID:<br>
                <input th:class="form-control" type="text" th:field="*{partId}" placeholder="Part ID" class="form-control mb-4 col-4"/>
            </label></p>

            <p><input type="submit" value="Submit" /></p>
        </form>

        <a th:href="@{/mainscreen}" class="btn btn-primary btn-sm mb-3">Home</a>
    </div>
    </body>
</html>
